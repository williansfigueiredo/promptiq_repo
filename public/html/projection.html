<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Broadcast Live</title>
    <link rel="stylesheet" href="../css/fonts/cjk-fonts.css">
    <link rel="stylesheet" href="../css/fonts/opendyslexic.css">

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: black;
        margin: 0;
        overflow: hidden;
        color: white;
        font-family: Arial, 'Noto Sans CJK', 'Microsoft YaHei', 'SimSun', 'PingFang SC', Helvetica, sans-serif;
        user-select: none;
      }

      #prompter-container {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
      }

      /* === ÁREA DO TEXTO === */
      #texto-limpo {
        padding-top: 4.1vh;
        padding-bottom: 30vh; /* Espaço extra no fim para subir tudo */

        /* === MUDANÇA AQUI: Margens PEQUENAS e SIMÉTRICAS === */
        /* Isso dá mais espaço para o texto não quebrar antes da hora */
        padding-left: 3% !important;
        padding-right: 0% !important;

        width: 96.8%;
        text-align: center;
        line-height: 1.7;
        font-weight: bold;
        word-wrap: break-word;
        overflow-wrap: break-word;
        white-space: pre-wrap;
        will-change: transform;
        transform: translate3d(0, 0, 0);
      }

      #texto-limpo p {
        margin-bottom: 0.2em;
        margin-top: 0;
      }
      #texto-limpo img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
      }

      /* === 1. MARCADOR (SETA VERDE) === */
      #cue-marker {
        position: absolute;
        left: 0 !important;
        top: 50%;
        width: 100%;
        height: 0;
        z-index: 9000;
        pointer-events: none;
        display: flex;
        align-items: center;
        transition: top 0.05s linear;
      }

      /* Tamanho da seta ajustado para 30px */
      .marker-arrow-icon {
        width: 50px;
        height: 50px;
        margin-left: 0px;
        filter: drop-shadow(0 0 5px rgba(0, 0, 0, 0.8));
      }

      .marker-bar-line {
        width: 100%;
        height: 4px;
        background-color: currentColor;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      }

      /* === 2. BARRA DE PROGRESSO === */
      #progress-container {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 8px;
        background: rgb(0, 0, 0);
        z-index: 9500;
        display: none;
      }

      #progress-thumb {
        position: absolute;
        top: 0;
        left: 0 !important;
        width: 100%;
        height: 40px;
        background-color: white;
        box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        transition: top 0.1s linear;
      }

      /* === 3. OVERLAY DE MENSAGENS (Mapeado com seus ícones) === */
      #message-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        z-index: 10000;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }

      #message-box {
        background-color: #ffc107;
        color: #000;
        padding: 20px 40px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        min-width: 200px;
        max-width: 80%;
        transform: scale(0.9);
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      #message-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }
      #message-overlay.show #message-box {
        transform: scale(1);
      }

      /* Container do ícone SVG */
      #msg-icon-svg {
        display: block;
        margin: 0 auto 10px auto;
        width: 60px; /* Ícone visível */
        height: 60px;
      }

      #msg-icon-svg svg {
        width: 100%;
        height: 100%;
        fill: currentColor; /* Pega a cor do texto automaticamente */
      }

      #msg-text {
        font-size: 2.5rem;
        font-weight: 900;
        text-transform: uppercase;
        line-height: 1.1;
      }
    </style>
  </head>
  <body>
    <div id="prompter-container">
      <div id="message-overlay">
        <div id="message-box">
          <div id="msg-icon-svg"></div>
          <div id="msg-text">MENSAGEM</div>
        </div>
      </div>

      <div id="progress-container">
        <div id="progress-thumb"></div>
      </div>

      <div id="cue-marker"></div>

      <div id="texto-limpo">WAITING FOR SIGNAL...</div>
    </div>

        "bi-chat-quote-fill":

          '<svg viewBox="0 0 16 16"><path d="M11.536 14.01A8.473 8.473 0 0 0 14.026 8a8.473 8.473 0 0 0-2.49-6.01l-.708.707A7.476 7.476 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303l.708.707z"/><path d="M10.121 12.596A6.48 6.48 0 0 0 12.025 8a6.48 6.48 0 0 0-1.904-4.596l-.707.707A5.483 5.483 0 0 1 11.025 8a5.483 5.483 0 0 1-1.61 3.89l.706.706z"/><path d="M8.707 11.182A4.486 4.486 0 0 0 10.025 8a4.486 4.486 0 0 0-1.318-3.182L8 5.525A3.489 3.489 0 0 1 9.025 8 3.49 3.49 0 0 1 8 10.475l.707.707zM6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06z"/></svg>',

      function renderMarker(type, color) {
        markerDiv.style.color = color || "#00FF00";
        if (type === "bar") {
          markerDiv.innerHTML = `<div class="marker-bar-line" style="background-color: ${color}"></div>`;
        } else {
          markerDiv.innerHTML = `
                <svg class="marker-arrow-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="fill: ${color}">
                    <path d="M12.14 8.753l-5.482 4.796c-.646.566-1.658.106-1.658-.753V3.204a1 1 0 0 1 1.659-.753l5.48 4.796a1 1 0 0 1 0 1.506z"/>
                </svg>`;
        }
      }

      function updateProgressBar(scrollY) {
        if (progressContainer.style.display === "none") return;
        const contentHeight = textoDiv.scrollHeight;
        const viewportHeight =
          document.getElementById("prompter-container").clientHeight;
        const maxScroll = Math.max(1, contentHeight - viewportHeight);
        const ratio = scrollY / maxScroll;
        const trackHeight = viewportHeight - progressThumb.clientHeight;
        let thumbTop = ratio * trackHeight;
        thumbTop = Math.max(0, Math.min(thumbTop, trackHeight));
        progressThumb.style.top = `${thumbTop}px`;
      }

      ipcRenderer.on("update-prompter-content", (e, content) => {
        if (content) {
          textoDiv.innerHTML = content;
          setTimeout(() => updateProgressBar(lastKnownY), 100);
        }
        textoDiv.style.transform = `translate3d(0, -${lastKnownY}px, 0)`;
      });

      // === SINCRONIZAÇÃO DE SCROLL (BASEADA EM RAZÃO) ===
      // Usa a razão (0 a 1) do scroll para sincronizar independente de padding
      ipcRenderer.on("update-scroll", (e, data) => {
        let targetY = 0;

        // Calcula altura máxima de scroll local (descontando paddings extras)
        const container = document.getElementById("prompter-container");
        const containerHeight = container ? container.clientHeight : window.innerHeight;
        const totalScrollHeight = textoDiv.scrollHeight;
        
        // Desconta padding-top e padding-bottom do cálculo
        const computedStyle = window.getComputedStyle(textoDiv);
        const paddingTop = parseFloat(computedStyle.paddingTop) || 0;
        const paddingBottom = parseFloat(computedStyle.paddingBottom) || 0;
        
        // Altura pura do conteúdo (sem paddings extras)
        const pureContentHeight = totalScrollHeight - paddingBottom;
        
        // Max scroll baseado no conteúdo puro
        const localMaxScroll = Math.max(1, pureContentHeight - containerHeight);

        // === NOVO: Corrige diferença de topo ===
        // Sempre desconta o padding-top do targetY para alinhar o início do texto
        let paddingTopOffset = paddingTop;

        if (typeof data === "number") {
          // Número direto = pixels (fallback)
          targetY = data - paddingTopOffset;
        } else if (typeof data === "object") {
          if (data.ratio !== undefined) {
            // NOVO: Razão de scroll (0 a 1) - mais precisa
            targetY = data.ratio * localMaxScroll;
          } else if (data.pixels !== undefined && data.maxScroll !== undefined) {
            // Converte pixels do remetente para pixels locais usando razão
            const remoteRatio = data.maxScroll > 0 ? data.pixels / data.maxScroll : 0;
            targetY = remoteRatio * localMaxScroll;
          } else if (data.percentage !== undefined) {
            // Fallback: porcentagem da altura total
            targetY = data.percentage * totalScrollHeight;
          }
        }

        // Aplica o offset do padding-top SEMPRE
        targetY = targetY - paddingTopOffset;

        lastKnownY = targetY;
        textoDiv.style.transform = `translate3d(0, -${targetY}px, 0)`;

        if (typeof updateProgressBar === "function") updateProgressBar(targetY);
      });

      // === EXIBIÇÃO DE MENSAGENS COM ÍCONE OFFLINE ===
      ipcRenderer.on("show-overlay-message", (e, item) => {
        msgText.innerText = item.message;
        msgBox.style.backgroundColor = item.bg;
        msgBox.style.color = item.color;

        // Pega o nome do ícone enviado pelo app.js (remove 'bi ' se houver)
        // Ex: 'bi bi-cone-striped' vira 'bi-cone-striped'
        const iconName = item.icon
          ? item.icon.replace("bi ", "").trim()
          : "default";

        // Procura no nosso mapa. Se não achar exato, tenta achar um que contenha o nome.
        let iconSvg = ICON_MAP[iconName] || ICON_MAP["default"];
        if (!ICON_MAP[iconName]) {
          const key = Object.keys(ICON_MAP).find((k) => iconName.includes(k));
          if (key) iconSvg = ICON_MAP[key];
        }

        msgIconContainer.innerHTML = iconSvg;

        msgOverlay.classList.add("show");
        if (msgTimeout) clearTimeout(msgTimeout);
        msgTimeout = setTimeout(() => {
          msgOverlay.classList.remove("show");
        }, 4000);
      });

      ipcRenderer.on("settings-updated-globally", (e, settings) => {
        // 1. Configurações Básicas de Cor e Fonte
        if (settings.backgroundColor)
          document.body.style.backgroundColor = settings.backgroundColor;
        if (settings.defaultFontColor)
          textoDiv.style.color = settings.defaultFontColor;

        if (settings.defaultFontSize) {
          // Aplica o tamanho da fonte
          textoDiv.style.fontSize = settings.defaultFontSize + "pt";
        }
        if (settings.defaultFont)
          textoDiv.style.fontFamily = settings.defaultFont;

        // === LÓGICA DA MARGEM (CORRIGIDA PARA VENCER O !IMPORTANT) ===
        if (settings.prompterMargin !== undefined) {
          // Se a margem for 0 (estado inicial/reset), removemos o estilo inline.
          // Assim, o CSS original (3% na esquerda, 0% na direita) volta a mandar.
          if (settings.prompterMargin === 0) {
            textoDiv.style.removeProperty("padding-left");
            textoDiv.style.removeProperty("padding-right");
          } else {
            // Se for diferente de 0 (ex: 100, 200, 300), forçamos a nova margem
            // usando 'important' para passar por cima do CSS.
            const marginVal = settings.prompterMargin + "px";

            textoDiv.style.setProperty("padding-left", marginVal, "important");
            textoDiv.style.setProperty("padding-right", marginVal, "important");
          }
        }

        // === 3. LÓGICA DO ESPELHAMENTO VERTICAL (Correção do Item 1) ===
        // Aplicamos o flip no container principal para inverter tudo (texto + margens)
        const container = document.getElementById("prompter-container");

        if (settings.flipVertical) {
          // Inverte verticalmente (de ponta cabeça)
          container.style.transform = "scaleY(-1)";
        } else {
          // Volta ao normal
          container.style.transform = "none";
        }

        // Ajustes do Marcador (Seta)
        renderMarker(
          settings.cueType || "arrow",
          settings.cueColor || "#00FF00"
        );

        // Ajuste da Barra de Progresso
        if (settings.showProgressIndicator) {
          progressContainer.style.display = "block";
          updateProgressBar(lastKnownY);
        } else {
          progressContainer.style.display = "none";
        }
      });

      window.onload = () => {
        ipcRenderer.send("projection-ready");
        ipcRenderer.send("request-initial-settings");

        setTimeout(() => {
          const height = window.innerHeight;
          markerDiv.style.top = height / 2 + "px";
        }, 500);
      };

      document.addEventListener("keydown", (e) => {
        if (e.key === "F11" || e.key === "Escape") {
          e.preventDefault();
          ipcRenderer.send("control-window", "fullscreen");
        }
      });
    </script>
  </body>
</html>

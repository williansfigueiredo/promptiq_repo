<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Iniciando Promptiq</title>
    <style>
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #00000000;
        overflow: hidden;
      }
      .green-bg {
        background-color: #00000000 !important;
      }
      #logo-image {
        max-width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div id="logo-container">
      <img
        id="logo-image"
        src="../assets/logo_splash.png"
        alt="Promptiq Logo"
      />
    </div>

    <script>
      window.onload = () => {
        const body = document.body;
        body.classList.add("green-bg");

        setTimeout(() => {
          body.classList.remove("green-bg");
          document.getElementById("logo-container").style.opacity = 1;
        }, 500);
      };
    </script>
  </body>
</html>
